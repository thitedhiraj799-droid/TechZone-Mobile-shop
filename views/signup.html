```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechZone Mobile Shop | Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--primary-blue:#00c3ff;
--dark-bg:#0a192f;
--card-bg:rgba(17,34,64,0.95);
--text-gray:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--dark-bg);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
}

.signup-card{
background:var(--card-bg);
width:100%;
max-width:420px;
padding:50px 40px;
border-radius:10px;
border-left:5px solid var(--primary-blue);
box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

header{
margin-bottom:40px;
}

header h1{
font-family:'Orbitron',sans-serif;
color:white;
font-size:26px;
}

header h1 span{
color:var(--primary-blue);
}

header p{
color:var(--text-gray);
font-size:14px;
margin-top:6px;
}

.input-box{
margin-bottom:25px;
}

.input-box label{
display:block;
color:var(--text-gray);
font-size:12px;
margin-bottom:6px;
}

.input-box input{
width:100%;
padding:12px;
background:#1e293b;
border:1px solid #334155;
color:white;
font-size:15px;
border-radius:6px;
outline:none;
}

.input-box input:focus{
border-color:var(--primary-blue);
}

.signup-btn{
width:100%;
padding:14px;
background:var(--primary-blue);
border:none;
color:#0a192f;
font-weight:bold;
font-size:15px;
cursor:pointer;
border-radius:6px;
}

.signup-btn:hover{
background:white;
}

.footer-links{
margin-top:25px;
font-size:13px;
color:var(--text-gray);
}

.footer-links a{
color:var(--primary-blue);
text-decoration:none;
margin-left:5px;
}

</style>
</head>

<body>

<div class="signup-card">

<header>
<h1>TECHZONE<span>MOBILE</span></h1>
<p>Create Customer Account</p>
</header>

<form method="POST" action="/signup">

<div class="input-box">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit" class="signup-btn">CREATE ACCOUNT</button>

</form>

<div class="footer-links">
Already have an account?
<a href="/login">Login</a>
</div>

</div>

</body>
</html>
```
