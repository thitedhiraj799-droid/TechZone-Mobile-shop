<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#020617,#0f172a);
  display:flex;
}

/* LEFT SIDE CONTENT */
.main{
  width:75%;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px;
}

.header h1{
  font-size:40px;
  font-weight:900;
  background:linear-gradient(#64ffda,#00e5ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  color:transparent;
}

.header p{
  color:#cbd5e1;
  margin-top:8px;
}

/* FILTER BAR */
#filter-bar{
  max-width:1200px;
  margin:10px auto;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

#filter-bar button{
  padding:8px 18px;
  border:none;
  border-radius:25px;
  background:#f9fbfa;
  color:#020617;
  font-weight:600;
  cursor:pointer;
}

/* GRID */
.grid{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  padding:15px;
  text-align:center;
  box-shadow:0 15px 30px rgba(0,0,0,0.25);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 25px 45px rgba(0,0,0,0.35);
}

/* IMAGE FIX */
.card img{
  width:100%;
  height:200px;          /* SAME HEIGHT FOR ALL */
  object-fit:contain;    /* NO STRETCH */
  background:#f1f5f9;    /* CLEAN BACKGROUND */
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

.price{
  margin-top:6px;
  font-weight:700;
  color:#16a34a;
}

.cart-btn{
  margin-top:10px;
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
  cursor:pointer;
}

/* RIGHT SIDE CART */
.cart{
  width:25%;
  background:#111827;
  color:white;
  padding:20px;
  height:100vh;
  overflow-y:auto;
  position:sticky;
  top:0;
}

.cart h2{
  text-align:center;
  margin-bottom:15px;
}

.cart-item{
  background:#1f2937;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.cart-item button{
  margin:3px;
  padding:3px 8px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.total{
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
}

.place-order{
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
</style>

let cart = [];

function renderCovers(list){
  const grid = document.getElementById("product-grid");
  grid.innerHTML="";
  list.forEach(c=>{
    grid.innerHTML+=`
    <div class="card">
      <img src="${c.img}">
      <h3>${c.name}</h3>
      <div class="price">₹${c.price}</div>
      <button class="cart-btn" onclick="addToCart('${c.name}')">
      Add to Cart
      </button>
    </div>`;
  });
}

function filterBrand(brand){
  if(brand==="All") renderCovers(covers);
  else renderCovers(covers.filter(c=>c.brand===brand));
}

function addToCart(name){
  const product = covers.find(c=>c.name===name);
  const exist = cart.find(item=>item.name===name);

  if(exist){
    exist.qty++;
  }else{
    cart.push({...product, qty:1});
  }
  renderCart();
}

function renderCart(){
  const cartDiv=document.getElementById("cart-items");
  cartDiv.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    total+=item.price*item.qty;

    cartDiv.innerHTML+=`
    <div class="cart-item">
      <p>${item.name}</p>
      <p>₹${item.price} x ${item.qty}</p>
      <button onclick="changeQty('${item.name}',1)">+</button>
      <button onclick="changeQty('${item.name}',-1)">-</button>
      <button onclick="removeItem('${item.name}')">Remove</button>
    </div>`;
  });

  document.getElementById("total").innerText=total;
}

function changeQty(name,val){
  const item=cart.find(i=>i.name===name);
  item.qty+=val;
  if(item.qty<=0) removeItem(name);
  renderCart();
}

function removeItem(name){
  cart=cart.filter(i=>i.name!==name);
  renderCart();
}

function placeOrder(){
  if(cart.length===0){
    alert("Your cart is empty!");
    return;
  }

  let message="🛒 *New Order - TechZone Mobile Shop*%0A%0A";
  let total=0;

  cart.forEach(item=>{
    message+=item.name+" (x"+item.qty+") - ₹"+(item.price*item.qty)+"%0A";
    total+=item.price*item.qty;
  });

  message+="%0A*Total: ₹"+total+"*";

  let phone="8805399650";

  window.open("https://wa.me/"+phone+"?text="+message,"_blank");
}

renderCovers(covers);
