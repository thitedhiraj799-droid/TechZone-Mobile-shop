<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechZone Mobile Shop</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ====== GENERAL ====== */
body{
  transition: background 0.3s,color 0.3s;
  background:#0f172a; /* Dark Blue Background */
  color:white;
}
.dark-mode body{
  background:#0f172a; /* Dark Blue */
  color:white;
}
.product-card{
  display:flex;
  flex-direction:column;
  height:100%;
  transition:all 0.3s ease;
  border-radius:0.5rem;
  overflow:hidden;
  position:relative;
}
.product-card:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 25px rgba(0,0,0,0.2);
}
.product-image{
  height:240px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  position:relative;
  overflow:hidden;
}
.product-image img{
  max-height:100%;
  max-width:100%;
  object-fit:contain;
  transition: transform 0.3s ease;
}
.product-image:hover img{
  transform:scale(1.1);
}
.fresh-badge,.offer-badge,.top-badge,.discount-badge{
  position:absolute;
  font-size:0.65rem;
  padding:2px 6px;
  border-radius:4px;
  font-weight:bold;
  text-transform:uppercase;
  color:white;
}
.fresh-badge{top:8px;left:8px;background:#16a34a;}
.offer-badge{top:8px;right:8px;background:#dc2626;}
.top-badge{bottom:8px;left:8px;background:#f97316;}
.discount-badge{top:8px;right:8px;background:#3b82f6;}
.price-tag{font-size:1.2rem;font-weight:700;color:#ea580c;}
.add-btn{
  background:linear-gradient(to right,#0f172a,#334155);
  transition:all 0.3s ease;
  padding:6px 12px;
  border-radius:0.375rem;
}
.add-btn:hover{
  background:linear-gradient(to right,#ea580c,#f97316);
}
.cart-sidebar{
  transition: transform 0.3s ease-in-out;
}
.cart-hidden{
  transform:translateX(100%);
}
.cart-footer{
  position:sticky;
  bottom:0;
  background:#0f172a; /* Dark Blue */
  padding-top:10px;
  color:white;
}
/* SEARCH & FILTER INPUT BLACK STYLE */
#filter-bar input,
#filter-bar select{
  background-color:#000;   /* Black Background */
  color:#fff;              /* White Text */
  border:1px solid #444;
}
#filter-bar{
  margin:20px auto;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;   /* Horizontal Center */
  align-items:center;       /* Vertical Center */
  max-width:600px;          /* Center width limit */
}


#filter-bar input::placeholder{
  color:#ccc;              /* Light placeholder text */
}

#filter-bar select option{
  background-color:#000;
  color:#fff;
}
/* ====== HERO SLIDER ====== */
#hero-slider{
  position:relative;
  max-width:7xl;
  margin:auto;
  overflow:hidden;
  border-radius:10px;
  height:450px;
}
#hero-slider img{
  width:100%;
  height:300px;
  object-fit:cover;
  transition:opacity 1s;
}
#hero-slider .slide{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0;
}
#hero-slider .active{
  opacity:1;
  z-index:10;
}
</style>
</head>
<body class="bg-[#0f172a] font-sans">

<!-- NAVBAR -->
<nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
  <h1 class="text-2xl font-bold">TechZone <span class="text-orange-500">Mobile</span></h1>
  <div class="flex items-center gap-4">
    <button onclick="toggleCart()" class="relative">
      <i class="fas fa-shopping-cart text-2xl"></i>
      <span id="cart-badge" class="absolute -top-2 -right-2 bg-orange-600 text-xs w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
    </button>
    <button onclick="toggleMode()" class="text-xl"><i class="fas fa-moon"></i></button>
  </div>
</nav>

<!-- HERO SLIDER -->
<div id="hero-slider" class="mt-6">
  <img src="https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772259040/vivo1_hrheut.jpg" class="slide active">
  <img src="https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772259043/vivo2_cq77ul.webp" class="slide">
  <img src="https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772259046/vivo3_nrzdnm.webp" class="slide">
</div>

<!-- HEADER -->
<header class="bg-slate-800 text-white text-center py-10 mt-6">
  <h2 class="text-4xl font-bold mb-2">Mobile Price List</h2>
  <p class="text-gray-300">Latest Available Models</p>
</header>

<!-- SEARCH & FILTER -->
<div id="filter-bar" class="max-w-7xl mx-auto p-6">
  <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="applyFilter()">
  <select id="ramFilter" onchange="applyFilter()">
    <option value="">All RAM</option>
    <option value="4GB">4GB</option>
    <option value="6GB">6GB</option>
    <option value="8GB">8GB</option>
    <option value="12GB">12GB</option>
  </select>
  <select id="sortPrice" onchange="applyFilter()">
    <option value="">Sort Price</option>
    <option value="low">Low → High</option>
    <option value="high">High → Low</option>
  </select>
</div>

<!-- PRODUCTS GRID -->
<main class="max-w-7xl mx-auto p-6">
  <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
</main>

<!-- CART SIDEBAR -->
<div id="cart-sidebar" class="cart-sidebar cart-hidden fixed top-0 right-0 w-full sm:w-96 h-full bg-[#0f172a] shadow-xl p-5 z-50 flex flex-col text-white">
  <div class="flex justify-between items-center border-b pb-3">
    <h3 class="text-xl font-bold">Your Order</h3>
    <button onclick="toggleCart()" class="text-2xl">&times;</button>
  </div>
  <div id="cart-items" class="flex-grow overflow-y-auto py-4"></div>
  <div class="cart-footer border-t pt-4">
    <p class="font-bold mb-2">Total: <span id="cart-total" class="text-orange-600">₹0</span></p>
    <a id="whatsappOrder" href="#" target="_blank" class="w-full mt-2 block text-center bg-green-600 text-white py-2 rounded hover:bg-green-700">Order via WhatsApp</a>
  </div>
</div>

<!-- FOOTER -->
<footer class="bg-slate-900 text-gray-400 text-center py-6">© 2026 TechZone Mobile Shop</footer>

},3000);

{id:36,name:"Vivo X200 Pro",price:71900,spec:"16GB/512GB",img:"https://res.cloudinary.com/dkhsgrkqn/image/upload/v1772259037/v39_gqhedv.jpg",top:true}

];


const grid=document.getElementById("product-grid");
function renderProducts(list){
  grid.innerHTML="";
  list.forEach(p=>{
    grid.innerHTML+=`
    <div class="product-card bg-white shadow hover:shadow-lg overflow-hidden">
      <div class="product-image">
        <img src="${p.img}" alt="${p.name}">
        ${p.fresh?'<span class="fresh-badge">NEW</span>':''}
        ${p.top?'<span class="top-badge">🔥 Top Seller</span>':''}
        ${p.discount?'<span class="discount-badge">'+p.discount+'% OFF</span>':''}
      </div>
      <div class="p-4 flex flex-col justify-between flex-grow">
        <div>
          <h3 class="font-bold text-lg">${p.name}</h3>
          <p class="text-sm text-gray-500">${p.spec}</p>
        </div>
        <div class="flex justify-between items-center mt-3">
          <span class="price-tag">₹${p.price}</span>
          <button onclick="addToCart('${p.name}',${p.price})" class="add-btn text-white">Add</button>
        </div>
      </div>
    </div>`;
  });
}
renderProducts(products);

function toggleCart(){ document.getElementById("cart-sidebar").classList.toggle("cart-hidden"); }
let cart=[];
function addToCart(name,price){
  const item=cart.find(i=>i.name===name);
  item?item.qty++:cart.push({name,price,qty:1});
  updateCart(); toggleCart();
}
function updateCart(){
  const box=document.getElementById("cart-items");
  const badge=document.getElementById("cart-badge");
  let total=0; box.innerHTML="";
  cart.forEach(i=>{ total+=i.price*i.qty; box.innerHTML+=`<div class="flex justify-between mb-2"><span>${i.name} x${i.qty}</span><span>₹${i.price*i.qty}</span></div>`; });
  document.getElementById("cart-total").innerText="₹"+total;
  badge.innerText=cart.reduce((s,i)=>s+i.qty,0);
  badge.classList.toggle("hidden",cart.length===0);
  document.getElementById("whatsappOrder").href=`https://wa.me/8805399650?text=Order:%20${cart.map(i=>i.name+' x'+i.qty).join(', ')}%20Total:%20₹${total}`;
}

// SEARCH & FILTER
function applyFilter(){
  const search=document.getElementById("searchInput").value.toLowerCase();
  const ram=document.getElementById("ramFilter").value;
  const sort=document.getElementById("sortPrice").value;
  let filtered=products.filter(p=>p.name.toLowerCase().includes(search));
  if(ram) filtered=filtered.filter(p=>p.spec.includes(ram));
  if(sort==='low') filtered.sort((a,b)=>a.price-b.price);
  if(sort==='high') filtered.sort((a,b)=>b.price-a.price);
  renderProducts(filtered);
}
</script>

</html>
