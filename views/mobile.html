<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TechZone Mobile Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
}

/* HERO */
.hero{
  padding:70px 20px;
  text-align:center;
  background:radial-gradient(circle at top,#1e293b,transparent 60%);
}

.hero h1{
  font-size:48px;
  font-weight:800;
  background:linear-gradient(#64ffda);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}


.hero p{
  margin-top:12px;
  font-size:18px;
  color:#cbd5f5;
}

/* GRID */
.products{
  max-width:1300px;
  margin:50px auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
}

/* CARD (WHITE BOX) */
.card{
  position:relative;
  border-radius:20px;
  background:#ffffff;
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
  overflow:hidden;
  transition:0.4s;
  text-align:center;
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
}

/* SHINE EFFECT */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.35),transparent);
  transform:translateX(-100%);
  transition:0.6s;
}

.card:hover::before{
  transform:translateX(100%);
}

/* IMAGE */
.card img{
  width:100%;
  height:230px;
  object-fit:contain;
  padding:20px;
  background:#ffffff;
}

/* BRAND NAME */
.card h3{
  color:#020617;
  margin:10px 0 18px;
}

/* BUTTON */
.card a{
  text-decoration:none;
  display:flex;
  justify-content:center;
}

.card button{
  margin-bottom:20px;
  padding:12px 36px;
  border:none;
  border-radius:30px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  color:white;
  background:linear-gradient(to right,#3b82f6,#6366f1);
  transition:0.3s;
}

.card button:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(99,102,241,0.8);
}

/* BADGE */
.badge{
  position:absolute;
  top:14px;
  right:14px;
  padding:6px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:bold;
  background:linear-gradient(to right,#22c55e,#4ade80);
  color:#020617;
}

/* FOOTER */
footer{
  text-align:center;
  padding:18px;
  background:#020617;
  color:#94a3b8;
  font-size:14px;
  border-top:1px solid #1e293b;
}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1{font-size:36px;}
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>TechZone Mobile Shop</h1>
  <p>Premium Mobiles • Best Prices • Trusted Store 📱</p>
</div>

<!-- PRODUCTS -->
<div class="products">

  <div class="card">

  </div>

  <div class="card">

    <h3>IQOO</h3>
    <a href="/iqoo"><button>Explore</button></a>
  </div>

  <div class="card">

  © 2025 TechZone Mobile Shop | Designed with ❤️

</body>
</html>
