<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* DARK BLUE BACKGROUND */
body{
    min-height:100vh;
    background: linear-gradient(135deg,#0a192f,#112240,#0f172a);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* MAIN CONTAINER */
.container{
    display:flex;
    gap:40px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
}

/* SMALLER CONTACT BOX */
.contact-box{
    width:400px;          /* Reduced width */
    padding:35px;         /* Reduced padding */
    border-radius:20px;
    background:#ffffff;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
    color:#0a192f;
}

/* TITLE */
.contact-box h2{
    text-align:center;
    margin-bottom:20px;
    font-size:24px;
}

/* FORM */
label{
    font-size:14px;
    display:block;
    margin-bottom:6px;
    font-weight:500;
}

input, textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    outline:none;
    margin-bottom:15px;
    font-size:14px;
}

textarea{
    resize:none;
    height:100px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#0a192f;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#112240;
    transform:scale(1.05);
}

/* INFO */
.info{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    color:#334155;
}

/* MAP */
.map-box{
    width:500px;
    height:520px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 25px 50px rgba(0,0,0,0.5);
}

.map-box iframe{
    width:100%;
    height:100%;
    border:0;
}

/* RESPONSIVE */
@media(max-width:1100px){
    .container{
        flex-direction:column;
    }

    .contact-box,
    .map-box{
        width:90%;
        max-width:600px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- CONTACT FORM -->
    <div class="contact-box">
        <h2>Contact Us</h2>

      <form method="POST" action="/contact">

    <label>Name</label>
    <input type="text" name="name" placeholder="Your name" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="Your email" required>

    <label>Message</label>
    <textarea name="message" placeholder="Type your message..." required></textarea>

    <button type="submit">Send Message</button>

</form>

        <div class="info">
            📞 +91 8805399650<br>
            📧 dhirajthite799@gmail.com <br>
            📍 Near Government Hospital, Pandharpur..
        </div>
    </div>

    <!-- GOOGLE MAP -->
    <div class="map-box">
        <iframe 
        src="https://www.google.com/maps?q=Rural+Hospital+Kurduwadi+Madha+Solapur+413208&output=embed"
        allowfullscreen=""
        loading="lazy">
        </iframe>
    </div>

</div>

</body>
</html>
