<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="EfZ-3WYljhHSE3kXPMt2UE6g8Jb34vZryPAmgZTjb94" />
<title>TechZone Mobile Shop | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--primary-blue:#00c3ff;
--dark-bg:#0a192f;
--card-bg:rgba(17,34,64,0.95);
--text-gray:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--dark-bg);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
}

.login-card{
background:var(--card-bg);
width:100%;
max-width:420px;
padding:50px 40px;
border-radius:10px;
border-left:5px solid var(--primary-blue);
box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

header{
margin-bottom:40px;
}

header h1{
font-family:'Orbitron',sans-serif;
color:white;
font-size:26px;
}

header h1 span{
color:var(--primary-blue);
}

header p{
color:var(--text-gray);
font-size:14px;
margin-top:6px;
}

.input-box{
margin-bottom:25px;
}

.input-box label{
display:block;
color:var(--text-gray);
font-size:12px;
margin-bottom:6px;
}

.input-box input{
width:100%;
padding:12px;
background:#1e293b;
border:1px solid #334155;
color:white;
font-size:15px;
border-radius:6px;
outline:none;
}

.input-box input:focus{
border-color:var(--primary-blue);
}

.login-btn{
width:100%;
padding:14px;
background:var(--primary-blue);
border:none;
color:#0a192f;
font-weight:bold;
font-size:15px;
cursor:pointer;
border-radius:6px;
}

.login-btn:hover{
background:white;
}

.footer-links{
margin-top:25px;
font-size:13px;
color:var(--text-gray);
}

.footer-links a{
color:var(--primary-blue);
text-decoration:none;
cursor:pointer;
margin-left:5px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#fff;
padding:30px;
border-radius:10px;
text-align:center;
width:320px;
}

.popup-box h3{
margin-bottom:10px;
}

.popup-box p{
font-size:14px;
margin-bottom:20px;
}

.popup-box button{
padding:10px 18px;
border:none;
background:#00c3ff;
color:#000;
font-weight:bold;
border-radius:5px;
cursor:pointer;
margin:5px;
}

.popup-box button:hover{
background:#0a192f;
color:white;
}

.close-btn{
background:#ccc;
}

</style>
</head>

<body>

<div class="login-card">

<header>
<h1>TECHZONE<span>MOBILE</span></h1>
<p>Customer Login</p>
</header>

<form method="POST" action="/login"> 

<div class="input-box">
<label>Email</label>
<input type="text" name="email" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit" class="login-btn">LOGIN</button>

</form>

<div class="footer-links">
Don't have an account?
<a onclick="openPopup()">Create Account</a>
</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<h3>Create Account</h3>
<p>Please create an account to continue.</p>

<button onclick="goSignup()">Create Account</button>
<button class="close-btn" onclick="closePopup()">Cancel</button>

</div>

</div>

<script>

function openPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function goSignup(){
window.location.href="/signup";
}

</script>

</body>
</html>
